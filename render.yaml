services:
  - type: web
    name: bahjat-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: false
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: EXTRA_CORS_ORIGINS
        sync: false
